<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Crafting</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * { box-sizing: border-box; user-select: none; }
        body {
            background: #1a1a1a;
            font-family: 'VT323', monospace;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 { 
            font-size: 40px; 
            margin-bottom: 20px; 
            text-shadow: 3px 3px 0 #000;
        }

        .main-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        /* --- ПАНЕЛЬ ПРЕДМЕТІВ (зліва) --- */
        .items-panel {
            background: #c6c6c6;
            border: 4px solid #000;
            border-top-color: #fff;
            border-left-color: #fff;
            border-bottom-color: #555;
            border-right-color: #555;
            padding: 15px;
            width: 220px;
        }

        .items-panel h2 {
            margin: 0 0 10px 0;
            color: #404040;
            font-size: 24px;
            text-align: center;
            text-shadow: 2px 2px 0 #fff;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(4, 44px);
            gap: 5px;
            justify-content: center;
        }

        .item-button {
            width: 44px;
            height: 44px;
            background: #8b8b8b;
            border: 3px solid #373737;
            border-top-color: #fff;
            border-left-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-size: cover;
            image-rendering: pixelated;
            position: relative;
            transition: transform 0.1s;
        }

        .item-button:hover {
            transform: scale(1.1);
            filter: brightness(1.3);
            z-index: 10;
        }

        .item-button:active {
            transform: scale(0.95);
        }

        /* --- ВЕРСТАК --- */
        .crafting-container {
            background: #c6c6c6;
            border: 4px solid #000;
            border-top-color: #fff;
            border-left-color: #fff;
            border-bottom-color: #555;
            border-right-color: #555;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .workbench-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .grid-3x3 {
            display: grid;
            grid-template-columns: repeat(3, 64px);
            grid-template-rows: repeat(3, 64px);
            gap: 2px;
        }

        .slot {
            width: 64px;
            height: 64px;
            background: #8b8b8b;
            border: 3px solid #373737;
            border-top-color: #fff;
            border-left-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-size: cover;
            image-rendering: pixelated;
            position: relative;
        }

        .slot:hover { filter: brightness(1.2); }
        .slot.filled { border-color: #fff; }

        .arrow { font-size: 40px; color: #404040; }

        .result-slot {
            width: 70px;
            height: 70px;
            background: #8b8b8b;
            border: 3px solid #373737;
            border-top-color: #fff;
            border-left-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-size: cover;
            image-rendering: pixelated;
            position: relative;
        }

        .result-slot:hover { filter: brightness(1.3); }
        .result-slot.active { 
            background-color: #fff;
            box-shadow: 0 0 10px gold;
        }

        .player-inventory {
            margin-top: 20px;
            display: flex;
            gap: 5px;
            background: #c6c6c6;
            padding: 10px;
            border: 4px solid #000;
            border-top-color: #fff;
            border-left-color: #fff;
        }

        .inv-slot {
            width: 54px;
            height: 54px;
            background: #8b8b8b;
            border: 3px solid #373737;
            border-top-color: #fff;
            border-left-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-size: cover;
            image-rendering: pixelated;
            position: relative;
        }

        .inv-slot:hover { filter: brightness(1.2); }
        .inv-slot.selected { 
            border: 3px solid #ff00ff;
            box-shadow: 0 0 5px #ff00ff;
        }

        .item-count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
        }

        .held-item-display {
            position: fixed;
            bottom: 100px;
            right: 100px;
            width: 64px;
            height: 64px;
            background: #8b8b8b;
            border: 3px solid #ff00ff;
            border-top-color: #fff;
            border-left-color: #fff;
            display: none;
            align-items: center;
            justify-content: center;
            background-size: cover;
            image-rendering: pixelated;
            z-index: 1000;
            box-shadow: 0 0 20px #ff00ff;
            pointer-events: none;
        }

        .held-item-display.active { display: flex; }

        .held-item-count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            color: #ff00ff;
            text-shadow: 2px 2px 0 #000;
            font-size: 20px;
            font-weight: bold;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background: #7a7a7a;
            color: white;
            border: 2px solid #000;
            border-top-color: #aaa;
            border-left-color: #aaa;
            padding: 8px 20px;
            font-family: 'VT323', monospace;
            font-size: 20px;
            cursor: pointer;
        }

        .btn:hover { background: #8a8a8a; }
        .btn:active {
            border-top-color: #000;
            border-left-color: #000;
            border-bottom-color: #aaa;
            border-right-color: #aaa;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .info {
            margin-top: 10px;
            color: #404040;
            font-size: 16px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>⛏️ Crafting Table</h1>

    <div class="main-container">
        <!-- ПАНЕЛЬ ПРЕДМЕТІВ -->
        <div class="items-panel">
            <h2>📦 Предмети</h2>
            <div class="items-grid" id="itemsGrid"></div>
        </div>

        <!-- ВЕРСТАК -->
        <div class="crafting-container">
            <div class="workbench-area">
                <div class="grid-3x3" id="grid"></div>
                
                <div class="arrow">➡️</div>
                
                <div class="result-slot" id="output" onclick="collectResult()"></div>
            </div>

            <div class="controls">
                <button class="btn" onclick="clearGrid()">🗑️ Очистити</button>
                <button class="btn" id="collectBtn" onclick="collectResult()" disabled>🎁 Забрати</button>
            </div>
            <div class="info" id="infoText">ЛКМ - взяти все | ПКМ - навпіл</div>

            <div class="player-inventory" id="inventory"></div>
        </div>
    </div>

    <!-- Відображення предмета в руці -->
    <div class="held-item-display" id="heldItemDisplay">
        <span class="held-item-count" id="heldItemCount"></span>
    </div>

    <script>
        // 📦 ВСІ ДОСТУПНІ ПРЕДМЕТИ
        const allItems = [
            { id: 'log', name: 'Дуб', texture: 'https://abrakadabra.fun/uploads/posts/2021-12/1639881942_8-abrakadabra-fun-p-doski-mainkraft-tekstura-8.png', maxStack: 64 },
            { id: 'planks', name: 'Дошка', texture: 'https://grizly.club/uploads/posts/2023-01/1672853506_grizly-club-p-tekstura-dereva-pikselnaya-5.png', maxStack: 64 },
            { id: 'stick', name: 'Палички', texture: 'https://example.com/stick.png', maxStack: 64 },
            { id: 'cobble', name: 'Камінь', texture: 'https://example.com/cobble.png', maxStack: 64 },
            { id: 'iron', name: 'Залізо', texture: 'https://example.com/iron.png', maxStack: 64 },
            { id: 'diamond', name: 'Діамант', texture: 'https://example.com/diamond.png', maxStack: 64 },
            { id: 'coal', name: 'Вугілля', texture: 'https://example.com/coal.png', maxStack: 64 },
            { id: 'apple', name: 'Яблуко', texture: 'https://example.com/apple.png', maxStack: 64 }
        ];

        const MAX_STACK = {
            'log': 64, 'planks': 64, 'stick': 64, 'cobble': 64,
            'iron': 64, 'diamond': 64, 'coal': 64, 'apple': 64,
            'sword': 1, 'pickaxe': 1, 'bread': 64
        };

        // Стан гри
        let heldItem = null;
        let gridSlots = [null, null, null, null, null, null, null, null, null]; // 9 слотів верстака
        let playerInv = [null, null, null, null, null, null, null, null, null, null]; // 10 слотів інвентаря

        let currentResult = null;

        // --- ІНІЦІАЛІЗАЦІЯ ---
        const gridEl = document.getElementById('grid');
        const outputEl = document.getElementById('output');
        const inventoryEl = document.getElementById('inventory');
        const itemsGridEl = document.getElementById('itemsGrid');
        const collectBtn = document.getElementById('collectBtn');
        const heldItemDisplay = document.getElementById('heldItemDisplay');
        const heldItemCountEl = document.getElementById('heldItemCount');
        const infoText = document.getElementById('infoText');

        // Створення сітки верстака
        for(let i=0; i<9; i++) {
            let slot = document.createElement('div');
            slot.className = 'slot';
            slot.dataset.index = i;
            
            // Обробка ЛКМ та ПКМ
            slot.addEventListener('mousedown', (e) => handleGridClick(i, e));
            slot.addEventListener('contextmenu', (e) => e.preventDefault()); // Блокування меню
            
            gridEl.appendChild(slot);
        }

        // Створення панелі предметів
        allItems.forEach(item => {
            let btn = document.createElement('div');
            btn.className = 'item-button';
            btn.style.backgroundImage = `url(${item.texture})`;
            btn.title = `${item.name} (ЛКМ - взяти 1)`;
            btn.onclick = () => takeItemFromPanel(item);
            itemsGridEl.appendChild(btn);
        });

        function getMaxStack(itemId) {
            return MAX_STACK[itemId] || 64;
        }

        function renderInventory() {
            inventoryEl.innerHTML = '';
            playerInv.forEach((item, index) => {
                let slot = document.createElement('div');
                slot.className = 'inv-slot';
                
                if(item) {
                    slot.style.backgroundImage = `url(${item.texture})`;
                    if(item.count > 1) {
                        let count = document.createElement('span');
                        count.className = 'item-count';
                        count.textContent = item.count;
                        slot.appendChild(count);
                    }
                }
                
                if(heldItem && heldItem.id === item?.id) {
                    slot.classList.add('selected');
                }
                
                // Обробка ЛКМ та ПКМ
                slot.addEventListener('mousedown', (e) => handleInventoryClick(index, e));
                slot.addEventListener('contextmenu', (e) => e.preventDefault());
                
                inventoryEl.appendChild(slot);
            });
        }

        function updateHeldItemDisplay() {
            if(heldItem) {
                heldItemDisplay.style.backgroundImage = `url(${heldItem.texture})`;
                heldItemCountEl.textContent = heldItem.count;
                heldItemDisplay.classList.add('active');
                
                let actionText = "ЛКМ - покласти | ПКМ - покласти половину";
                if(heldItem.count === 1) actionText = "ЛКМ - покласти";
                
                infoText.textContent = `В руці: ${heldItem.name} x${heldItem.count}`;
            } else {
                heldItemDisplay.classList.remove('active');
                infoText.textContent = 'ЛКМ - взяти все | ПКМ - взяти половину';
            }
        }

        // --- ЛОГІКА МЕНЮ ПРЕДМЕТІВ ---
        function takeItemFromPanel(item) {
            // Якщо рука пуста - беремо 1 штуку
            if(!heldItem) {
                heldItem = {
                    ...item,
                    count: 1 // БЕРЕМ ПО ОДНОМУ
                };
            }
            // Якщо тримаємо такий самий - додаємо 1 (якщо місце є)
            else if(heldItem.id === item.id) {
                let spaceLeft = heldItem.maxStack - heldItem.count;
                if(spaceLeft > 0) {
                    heldItem.count += 1;
                }
            }
            // Якщо інший - замінюємо на 1 штуку нового
            else {
                heldItem = {
                    ...item,
                    count: 1
                };
            }
            
            renderInventory();
            updateHeldItemDisplay();
        }

        // --- ЛОГІКА ВЕРСТАКА (Сітка 3x3) ---
        function handleGridClick(index, e) {
            e.preventDefault();
            let isRightClick = (e.button === 2);
            
            let currentItem = gridSlots[index];

            // --- ПРАВА КНОПКА (ДІЛЕННЯ НАВПІЛ) ---
            if (isRightClick) {
                if (!heldItem && currentItem) {
                    // Рука пуста, в слоті є предмет
                    let splitAmount = Math.floor(currentItem.count / 2);
                    if (splitAmount < 1 && currentItem.count > 0) splitAmount = 1; // Якщо 1, то беремо все
                    
                    heldItem = { ...currentItem, count: splitAmount };
                    currentItem.count -= splitAmount;
                    if (currentItem.count <= 0) gridSlots[index] = null;
                }
                else if (heldItem && !currentItem) {
                    // Рука повна, слот порожній -> кладемо 1
                    heldItem.count--;
                    gridSlots[index] = { ...heldItem, count: 1 };
                    if (heldItem.count <= 0) heldItem = null;
                }
                else if (heldItem && currentItem && heldItem.id === currentItem.id) {
                    // Рука і слот однакові -> додаємо 1 в слот
                    if (currentItem.count < currentItem.maxStack) {
                        currentItem.count++;
                        heldItem.count--;
                        if (heldItem.count <= 0) heldItem = null;
                    }
                }
            }
            // --- ЛІВА КНОПКА (ПОВНИЙ СТЕК) ---
            else {
                // Якщо тримаємо предмет і слот порожній -> кладемо весь стек
                if(heldItem && !currentItem) {
                    gridSlots[index] = {...heldItem};
                    heldItem = null;
                }
                // Якщо слот має предмет, а рука пуста -> забираємо весь стек
                else if(!heldItem && currentItem) {
                    heldItem = {...currentItem};
                    gridSlots[index] = null;
                }
                // Якщо і там і там є предмети -> міняємо місцями
                else if(heldItem && currentItem) {
                    let temp = {...heldItem};
                    heldItem = {...currentItem};
                    gridSlots[index] = temp;
                }
            }

            renderInventory();
            updateHeldItemDisplay();
            updateOutput();
        }

        // --- ЛОГІКА ІНВЕНТАРЮ ---
        function handleInventoryClick(index, e) {
            e.preventDefault();
            let isRightClick = (e.button === 2);
            
            let currentItem = playerInv[index];

            // --- ПРАВА КНОПКА (ДІЛЕННЯ НАВПІЛ) ---
            if (isRightClick) {
                if (!heldItem && currentItem) {
                    // Рука пуста, в слоті є предмет
                    let splitAmount = Math.floor(currentItem.count / 2);
                    if (splitAmount < 1 && currentItem.count > 0) splitAmount = 1;
                    
                    heldItem = { ...currentItem, count: splitAmount };
                    currentItem.count -= splitAmount;
                    if (currentItem.count <= 0) playerInv[index] = null;
                }
                else if (heldItem && !currentItem) {
                    // Рука повна, слот порожній -> кладемо 1
                    heldItem.count--;
                    playerInv[index] = { ...heldItem, count: 1 };
                    if (heldItem.count <= 0) heldItem = null;
                }
                else if (heldItem && currentItem && heldItem.id === currentItem.id) {
                    // Рука і слот однакові -> додаємо 1 в слот
                    if (currentItem.count < currentItem.maxStack) {
                        currentItem.count++;
                        heldItem.count--;
                        if (heldItem.count <= 0) heldItem = null;
                    }
                }
            }
            // --- ЛІВА КНОПКА (ПОВНИЙ СТЕК) ---
            else {
                // Якщо рука пуста - беремо весь стек
                if(!heldItem && currentItem) {
                    heldItem = {...currentItem};
                    playerInv[index] = null;
                }
                // Якщо рука повна і слот порожній - кладемо весь стек
                else if(heldItem && !currentItem) {
                    playerInv[index] = {...heldItem};
                    heldItem = null;
                }
                // Якщо є предмети в обох місцях - міняємо місцями
                else if(heldItem && currentItem) {
                    let temp = {...heldItem};
                    heldItem = {...currentItem};
                    playerInv[index] = temp;
                }
            }
            
            renderInventory();
            updateHeldItemDisplay();
        }

        function updateOutput() {
            let woodCount = 0;
            gridSlots.forEach(slot => {
                if(slot && slot.id === 'log') woodCount++;
            });

            if(woodCount > 0) {
                currentResult = {
                    id: 'planks',
                    name: 'Дошка',
                    texture: 'https://grizly.club/uploads/posts/2023-01/1672853506_grizly-club-p-tekstura-dereva-pikselnaya-5.png',
                    count: woodCount * 4,
                    maxStack: 64
                };
                
                outputEl.style.backgroundImage = `url(${currentResult.texture})`;
                outputEl.classList.add('active');
                
                let existingCount = outputEl.querySelector('.item-count');
                if(existingCount) existingCount.remove();
                
                let count = document.createElement('span');
                count.className = 'item-count';
                count.textContent = '×' + currentResult.count;
                outputEl.appendChild(count);
                
                collectBtn.disabled = false;
            } else {
                currentResult = null;
                outputEl.style.backgroundImage = '';
                outputEl.classList.remove('active');
                outputEl.innerHTML = '';
                collectBtn.disabled = true;
            }
        }

        function collectResult() {
            if(!currentResult) return;
            
            let placed = false;
            let amountToPlace = currentResult.count;
            
            // Спроба об'єднати з існуючими
            for(let i=0; i<playerInv.length; i++) {
                if(playerInv[i] && playerInv[i].id === currentResult.id) {
                    let spaceLeft = playerInv[i].maxStack - playerInv[i].count;
                    if(spaceLeft > 0) {
                        let amountToAdd = Math.min(spaceLeft, amountToPlace);
                        playerInv[i].count += amountToAdd;
                        amountToPlace -= amountToAdd;
                        
                        if(amountToPlace <= 0) {
                            placed = true;
                            break;
                        }
                    }
                }
            }
            
            // Якщо залишилось - шукаємо порожній слот
            if(amountToPlace > 0) {
                for(let i=0; i<playerInv.length; i++) {
                    if(!playerInv[i]) {
                        playerInv[i] = {...currentResult, count: amountToPlace};
                        placed = true;
                        break;
                    }
                }
            }
            
            if(placed || amountToPlace <= 0) {
                // Очищаємо сітку (витрачаємо ресурси)
                for(let i=0; i<gridSlots.length; i++) {
                    if(gridSlots[i] && gridSlots[i].id === 'log') {
                        gridSlots[i].count--;
                        if(gridSlots[i].count <= 0) gridSlots[i] = null;
                    }
                }
                
                renderInventory();
                currentResult = null;
                collectBtn.disabled = true;
                updateOutput();
            } else {
                alert('Інвентар заповнений!');
            }
        }

        function clearGrid(saveToInventory = true) {
            for(let i=0; i<gridSlots.length; i++) {
                let item = gridSlots[i];
                if(item && saveToInventory) {
                    let placed = false;
                    // Спроба об'єднати
                    for(let j=0; j<playerInv.length; j++) {
                        if(playerInv[j] && playerInv[j].id === item.id) {
                            let spaceLeft = playerInv[j].maxStack - playerInv[j].count;
                            if(spaceLeft > 0) {
                                let amount = Math.min(spaceLeft, item.count);
                                playerInv[j].count += amount;
                                item.count -= amount;
                                if(item.count <= 0) { placed = true; break; }
                            }
                        }
                    }
                    // Якщо не вийшло - вільний слот
                    if(!placed && item.count > 0) {
                        for(let j=0; j<playerInv.length; j++) {
                            if(!playerInv[j]) {
                                playerInv[j] = item;
                                break;
                            }
                        }
                    }
                }
                gridSlots[i] = null;
            }
            if(saveToInventory) renderInventory();
            updateOutput();
        }

        // Старт
        renderInventory();
        updateHeldItemDisplay();
        updateOutput();
    </script>
</body>
</html>
