<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Crafting</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * { box-sizing: border-box; user-select: none; }
        body {
            background: #1a1a1a;
            font-family: 'VT323', monospace;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 { 
            font-size: 40px; 
            margin-bottom: 20px; 
            text-shadow: 3px 3px 0 #000;
        }

        .crafting-container {
            background: #c6c6c6;
            border: 4px solid #000;
            border-top-color: #fff;
            border-left-color: #fff;
            border-bottom-color: #555;
            border-right-color: #555;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .workbench-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .grid-3x3 {
            display: grid;
            grid-template-columns: repeat(3, 64px);
            grid-template-rows: repeat(3, 64px);
            gap: 2px;
        }

        .slot {
            width: 64px;
            height: 64px;
            background: #8b8b8b;
            border: 3px solid #373737;
            border-top-color: #fff;
            border-left-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-size: cover;
            image-rendering: pixelated;
        }

        .slot:hover { 
            filter: brightness(1.2); 
        }

        .slot.filled { 
            border-color: #fff;
        }

        .arrow { 
            font-size: 40px; 
            color: #404040;
        }

        .result-slot {
            width: 70px;
            height: 70px;
            background: #8b8b8b;
            border: 3px solid #373737;
            border-top-color: #fff;
            border-left-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-size: cover;
            image-rendering: pixelated;
        }

        .result-slot.active { 
            background-color: #fff;
        }

        .player-inventory {
            margin-top: 20px;
            display: flex;
            gap: 5px;
            background: #c6c6c6;
            padding: 10px;
            border: 4px solid #000;
            border-top-color: #fff;
            border-left-color: #fff;
        }

        .inv-slot {
            width: 54px;
            height: 54px;
            background: #8b8b8b;
            border: 3px solid #373737;
            border-top-color: #fff;
            border-left-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-size: cover;
            image-rendering: pixelated;
            position: relative;
        }

        .inv-slot:hover { 
            filter: brightness(1.2); 
        }

        .inv-slot.selected { 
            border: 3px solid #ff00ff;
        }

        .item-count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1>⛏️ Crafting Table</h1>

    <div class="crafting-container">
        <div class="workbench-area">
            <div class="grid-3x3" id="grid"></div>
            
            <div class="arrow">➡️</div>
            
            <div class="result-slot" id="output"></div>
        </div>
    </div>

    <div class="player-inventory" id="inventory"></div>

    <script>
        // 🎒 Інвентар
        let heldItem = null;
        let playerInv = [
            { id: 'log', name: 'Дуб', texture: 'https://abrakadabra.fun/uploads/posts/2021-12/1639881942_8-abrakadabra-fun-p-doski-mainkraft-tekstura-8.png', count: 64 },
            null, null, null, null, null, null, null
        ];

        // 📜 Рецепти
        const recipes = {
            'log_to_planks': {
                input: 'log',
                output: { id: 'planks', name: 'Дошка', texture: 'https://grizly.club/uploads/posts/2023-01/1672853506_grizly-club-p-tekstura-dereva-pikselnaya-5.png', count: 4 },
                shapeless: true
            }
        };

        // --- ІНІЦІАЛІЗАЦІЯ ---
        const gridEl = document.getElementById('grid');
        const outputEl = document.getElementById('output');
        const inventoryEl = document.getElementById('inventory');

        // Створення сітки
        for(let i=0; i<9; i++) {
            let slot = document.createElement('div');
            slot.className = 'slot';
            slot.dataset.index = i;
            slot.onclick = () => handleGridClick(i);
            gridEl.appendChild(slot);
        }

        // Відображення інвентарю
        function renderInventory() {
            inventoryEl.innerHTML = '';
            playerInv.forEach((item, index) => {
                let slot = document.createElement('div');
                slot.className = 'inv-slot';
                
                if(item) {
                    slot.style.backgroundImage = `url(${item.texture})`;
                    if(item.count > 1) {
                        let count = document.createElement('span');
                        count.className = 'item-count';
                        count.textContent = item.count;
                        slot.appendChild(count);
                    }
                }
                
                if(heldItem && heldItem.id === item?.id) {
                    slot.classList.add('selected');
                }
                
                slot.onclick = () => handleInventoryClick(index);
                inventoryEl.appendChild(slot);
            });
        }

        renderInventory();
        updateOutput();

        // --- ЛОГІКА ---
        function handleInventoryClick(index) {
            let item = playerInv[index];
            
            if(!heldItem && item) {
                heldItem = {...item};
                playerInv[index] = null;
                renderInventory();
            }
        }

        function handleGridClick(index) {
            let gridSlots = document.querySelectorAll('.slot');
            let currentSlot = gridSlots[index];
            
            if(heldItem && !currentSlot.style.backgroundImage && heldItem.id === 'log') {
                currentSlot.style.backgroundImage = `url(${heldItem.texture})`;
                currentSlot.classList.add('filled');
                heldItem = null;
                renderInventory();
                updateOutput();
            }
            else if(currentSlot.style.backgroundImage) {
                currentSlot.style.backgroundImage = '';
                currentSlot.classList.remove('filled');
                heldItem = { id: 'log', name: 'Дуб', texture: 'https://abrakadabra.fun/uploads/posts/2021-12/1639881942_8-abrakadabra-fun-p-doski-mainkraft-tekstura-8.png', count: 1 };
                renderInventory();
                updateOutput();
            }
        }

        function updateOutput() {
            let gridSlots = document.querySelectorAll('.slot');
            let woodCount = 0;

            gridSlots.forEach(slot => {
                if(slot.style.backgroundImage.includes('doski-mainkraft')) {
                    woodCount++;
                }
            });

            if(woodCount > 0) {
                outputEl.style.backgroundImage = `url(https://grizly.club/uploads/posts/2023-01/1672853506_grizly-club-p-tekstura-dereva-pikselnaya-5.png)`;
                outputEl.classList.add('active');
                
                let existingCount = outputEl.querySelector('.item-count');
                if(existingCount) existingCount.remove();
                
                let count = document.createElement('span');
                count.className = 'item-count';
                count.textContent = '×' + (woodCount * 4);
                outputEl.appendChild(count);
            } else {
                outputEl.style.backgroundImage = '';
                outputEl.classList.remove('active');
                outputEl.innerHTML = '';
            }
        }
    </script>
</body>
</html>
