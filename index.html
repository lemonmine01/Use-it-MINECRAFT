<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Crafting</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * { box-sizing: border-box; user-select: none; }
        body {
            background: #1a1a1a;
            font-family: 'VT323', monospace;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 { 
            font-size: 40px; 
            margin-bottom: 20px; 
            text-shadow: 3px 3px 0 #000;
        }

        .main-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        /* --- ПАНЕЛЬ ПРЕДМЕТІВ (зліва) --- */
        .items-panel {
            background: #c6c6c6;
            border: 4px solid #000;
            border-top-color: #fff;
            border-left-color: #fff;
            border-bottom-color: #555;
            border-right-color: #555;
            padding: 15px;
            width: 220px;
        }

        .items-panel h2 {
            margin: 0 0 10px 0;
            color: #404040;
            font-size: 24px;
            text-align: center;
            text-shadow: 2px 2px 0 #fff;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(4, 44px);
            gap: 5px;
            justify-content: center;
        }

        .item-button {
            width: 44px;
            height: 44px;
            background: #8b8b8b;
            border: 3px solid #373737;
            border-top-color: #fff;
            border-left-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-size: cover;
            image-rendering: pixelated;
            position: relative;
            transition: transform 0.1s;
        }

        .item-button:hover {
            transform: scale(1.1);
            filter: brightness(1.3);
            z-index: 10;
        }

        .item-button:active { transform: scale(0.95); }

        /* --- ВЕРСТАК --- */
        .crafting-container {
            background: #c6c6c6;
            border: 4px solid #000;
            border-top-color: #fff;
            border-left-color: #fff;
            border-bottom-color: #555;
            border-right-color: #555;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .workbench-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .grid-3x3 {
            display: grid;
            grid-template-columns: repeat(3, 64px);
            grid-template-rows: repeat(3, 64px);
            gap: 2px;
        }

        .slot {
            width: 64px;
            height: 64px;
            background: #8b8b8b;
            border: 3px solid #373737;
            border-top-color: #fff;
            border-left-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-size: cover;
            image-rendering: pixelated;
            position: relative;
        }

        .slot:hover { filter: brightness(1.2); }
        .slot.filled { border-color: #fff; }

        .arrow { font-size: 40px; color: #404040; }

        .result-slot {
            width: 70px;
            height: 70px;
            background: #8b8b8b;
            border: 3px solid #373737;
            border-top-color: #fff;
            border-left-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-size: cover;
            image-rendering: pixelated;
            position: relative;
        }

        .result-slot:hover { filter: brightness(1.3); }
        .result-slot.active { 
            background-color: #fff;
            box-shadow: 0 0 10px gold;
        }

        .player-inventory {
            margin-top: 20px;
            display: flex;
            gap: 5px;
            background: #c6c6c6;
            padding: 10px;
            border: 4px solid #000;
            border-top-color: #fff;
            border-left-color: #fff;
        }

        .inv-slot {
            width: 54px;
            height: 54px;
            background: #8b8b8b;
            border: 3px solid #373737;
            border-top-color: #fff;
            border-left-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-size: cover;
            image-rendering: pixelated;
            position: relative;
        }

        .inv-slot:hover { filter: brightness(1.2); }
        .inv-slot.selected { 
            border: 3px solid #ff00ff;
            box-shadow: 0 0 5px #ff00ff;
        }

        .item-count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
        }

        .held-item-display {
            position: fixed;
            bottom: 100px;
            right: 100px;
            width: 64px;
            height: 64px;
            background: #8b8b8b;
            border: 3px solid #ff00ff;
            border-top-color: #fff;
            border-left-color: #fff;
            display: none;
            align-items: center;
            justify-content: center;
            background-size: cover;
            image-rendering: pixelated;
            z-index: 1000;
            box-shadow: 0 0 20px #ff00ff;
            pointer-events: none;
        }

        .held-item-display.active { display: flex; }

        .held-item-count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            color: #ff00ff;
            text-shadow: 2px 2px 0 #000;
            font-size: 20px;
            font-weight: bold;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background: #7a7a7a;
            color: white;
            border: 2px solid #000;
            border-top-color: #aaa;
            border-left-color: #aaa;
            padding: 8px 20px;
            font-family: 'VT323', monospace;
            font-size: 20px;
            cursor: pointer;
        }

        .btn:hover { background: #8a8a8a; }
        .btn:active {
            border-top-color: #000;
            border-left-color: #000;
            border-bottom-color: #aaa;
            border-right-color: #aaa;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .info {
            margin-top: 10px;
            color: #404040;
            font-size: 16px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>⛏️ Crafting Table</h1>

    <div class="main-container">
        <!-- ПАНЕЛЬ ПРЕДМЕТІВ -->
        <div class="items-panel">
            <h2>📦 Предмети</h2>
            <div class="items-grid" id="itemsGrid"></div>
        </div>

        <!-- ВЕРСТАК -->
        <div class="crafting-container">
            <div class="workbench-area">
                <div class="grid-3x3" id="grid"></div>
                
                <div class="arrow">➡️</div>
                
                <div class="result-slot" id="output" onclick="collectResult()"></div>
            </div>

            <div class="controls">
                <button class="btn" onclick="clearGrid()">🗑️ Очистити</button>
                <button class="btn" id="collectBtn" onclick="collectResult()" disabled>🎁 Забрати</button>
            </div>
            <div class="info" id="infoText">ЛКМ - взяти все | ПКМ - ділити</div>

            <div class="player-inventory" id="inventory"></div>
        </div>
    </div>

    <!-- Відображення предмета в руці -->
    <div class="held-item-display" id="heldItemDisplay">
        <span class="held-item-count" id="heldItemCount"></span>
    </div>

    <script>
        // 📦 ВСІ ДОСТУПНІ ПРЕДМЕТИ
        const allItems = [
            { id: 'log', name: 'Дуб', texture: 'https://abrakadabra.fun/uploads/posts/2021-12/1639881942_8-abrakadabra-fun-p-doski-mainkraft-tekstura-8.png', maxStack: 64 },
            { id: 'planks', name: 'Дошка', texture: 'https://grizly.club/uploads/posts/2023-01/1672853506_grizly-club-p-tekstura-dereva-pikselnaya-5.png', maxStack: 64 },
            { id: 'stick', name: 'Палички', texture: 'https://static.wikia.nocookie.net/minecraft_ru_gamepedia/images/1/1b/%D0%9F%D0%B0%D0%BB%D0%BA%D0%B0_JE1_BE1.png/revision/latest/scale-to-width-down/160?cb=20180824073505', maxStack: 64 },
            { id: 'cobble', name: 'Булижник', texture: 'https://png.klev.club/uploads/posts/2024-04/png-klev-club-ljpl-p-bulizhnik-mainkraft-png-6.png', maxStack: 64 },
            { id: 'raw iron', name: 'Необроблене залізо', texture: 'https://media.forgecdn.net/avatars/thumbnails/426/304/256/256/637656566602163772.png', maxStack: 64 },
            { id: 'diamond', name: 'Діамант', texture: 'https://grizly.club/uploads/posts/2022-12/1670854398_grizly-club-p-almaz-mainkraft-png-8.png', maxStack: 64 },
            { id: 'coal', name: 'Вугілля', texture: 'https://static.wikia.nocookie.net/minecraft_gamepedia/images/5/58/Coal_JE4_BE3.png/revision/latest?cb=20230625214010', maxStack: 64 },
            { id: 'apple', name: 'Яблуко', texture: 'https://uk.minecraft.wiki/w/%D0%AF%D0%B1%D0%BB%D1%83%D0%BA%D0%BE', maxStack: 64 }
        ];

        const MAX_STACK = {
            'log': 64, 'planks': 64, 'stick': 64, 'cobble': 64,
            'iron': 64, 'diamond': 64, 'coal': 64, 'apple': 64
        };

        // Стан гри
        let heldItem = null;
        let gridSlots = [null, null, null, null, null, null, null, null, null];
        let playerInv = [null, null, null, null, null, null, null, null, null, null];

        let currentResult = null;

        // --- ІНІЦІАЛІЗАЦІЯ ---
        const gridEl = document.getElementById('grid');
        const outputEl = document.getElementById('output');
        const inventoryEl = document.getElementById('inventory');
        const itemsGridEl = document.getElementById('itemsGrid');
        const collectBtn = document.getElementById('collectBtn');
        const heldItemDisplay = document.getElementById('heldItemDisplay');
        const heldItemCountEl = document.getElementById('heldItemCount');
        const infoText = document.getElementById('infoText');

        // Сітка верстака
        for(let i=0; i<9; i++) {
            let slot = document.createElement('div');
            slot.className = 'slot';
            slot.dataset.index = i;
            slot.addEventListener('mousedown', (e) => handleGridClick(i, e));
            slot.addEventListener('contextmenu', (e) => e.preventDefault());
            gridEl.appendChild(slot);
        }

        // Панель предметів
        allItems.forEach(item => {
            let btn = document.createElement('div');
            btn.className = 'item-button';
            btn.style.backgroundImage = `url(${item.texture})`;
            btn.title = `${item.name} (ЛКМ - взяти 1)`;
            btn.onclick = () => takeItemFromPanel(item);
            itemsGridEl.appendChild(btn);
        });

        function getMaxStack(itemId) { return MAX_STACK[itemId] || 64; }

        function renderInventory() {
            inventoryEl.innerHTML = '';
            playerInv.forEach((item, index) => {
                let slot = document.createElement('div');
                slot.className = 'inv-slot';
                
                if(item) {
                    slot.style.backgroundImage = `url(${item.texture})`;
                    if(item.count > 1) {
                        let count = document.createElement('span');
                        count.className = 'item-count';
                        count.textContent = item.count;
                        slot.appendChild(count);
                    }
                }
                
                if(heldItem && heldItem.id === item?.id) slot.classList.add('selected');
                
                slot.addEventListener('mousedown', (e) => handleInventoryClick(index, e));
                slot.addEventListener('contextmenu', (e) => e.preventDefault());
                
                inventoryEl.appendChild(slot);
            });
        }

        function updateHeldItemDisplay() {
            if(heldItem) {
                heldItemDisplay.style.backgroundImage = `url(${heldItem.texture})`;
                heldItemCountEl.textContent = heldItem.count;
                heldItemDisplay.classList.add('active');
            } else {
                heldItemDisplay.classList.remove('active');
            }
        }

        // --- МЕНЮ ПРЕДМЕТІВ ---
        function takeItemFromPanel(item) {
            if(!heldItem) {
                heldItem = { ...item, count: 1 };
            } else if(heldItem.id === item.id) {
                if(heldItem.count < heldItem.maxStack) heldItem.count++;
            } else {
                heldItem = { ...item, count: 1 };
            }
            renderInventory();
            updateHeldItemDisplay();
        }

        // --- ВЕРСТАК (Логіка Стакання) ---
        function handleGridClick(index, e) {
            e.preventDefault();
            let isRightClick = (e.button === 2);
            let currentItem = gridSlots[index];

            if (isRightClick) { // ПКМ: Ділення або по 1 шт
                if (!heldItem && currentItem) {
                    let split = Math.floor(currentItem.count / 2);
                    if (split < 1) split = 1;
                    heldItem = { ...currentItem, count: split };
                    currentItem.count -= split;
                    if (currentItem.count <= 0) gridSlots[index] = null;
                } 
                else if (heldItem && !currentItem) {
                    heldItem.count--;
                    gridSlots[index] = { ...heldItem, count: 1 };
                    if (heldItem.count <= 0) heldItem = null;
                }
                else if (heldItem && currentItem && heldItem.id === currentItem.id) {
                    if (currentItem.count < currentItem.maxStack) {
                        currentItem.count++;
                        heldItem.count--;
                        if (heldItem.count <= 0) heldItem = null;
                    }
                }
            } 
            else { // ЛКМ: Переміщення та СТАКАННЯ
                if (!heldItem && currentItem) {
                    heldItem = { ...currentItem };
                    gridSlots[index] = null;
                } 
                else if (heldItem && !currentItem) {
                    gridSlots[index] = { ...heldItem };
                    heldItem = null;
                } 
                else if (heldItem && currentItem) {
                    if (heldItem.id === currentItem.id) {
                        // ЛОГІКА СТАКАННЯ:
                        let space = currentItem.maxStack - currentItem.count;
                        let move = Math.min(space, heldItem.count);
                        currentItem.count += move;
                        heldItem.count -= move;
                        if (heldItem.count <= 0) heldItem = null;
                    } else {
                        // Обмін місцями
                        let temp = { ...heldItem };
                        heldItem = { ...currentItem };
                        gridSlots[index] = temp;
                    }
                }
            }
            renderInventory();
            updateHeldItemDisplay();
            updateOutput();
        }

        // --- ІНВЕНТАР (Логіка Стакання) ---
        function handleInventoryClick(index, e) {
            e.preventDefault();
            let isRightClick = (e.button === 2);
            let currentItem = playerInv[index];

            if (isRightClick) {
                if (!heldItem && currentItem) {
                    let split = Math.floor(currentItem.count / 2);
                    if (split < 1) split = 1;
                    heldItem = { ...currentItem, count: split };
                    currentItem.count -= split;
                    if (currentItem.count <= 0) playerInv[index] = null;
                } 
                else if (heldItem && !currentItem) {
                    heldItem.count--;
                    playerInv[index] = { ...heldItem, count: 1 };
                    if (heldItem.count <= 0) heldItem = null;
                }
                else if (heldItem && currentItem && heldItem.id === currentItem.id) {
                    if (currentItem.count < currentItem.maxStack) {
                        currentItem.count++;
                        heldItem.count--;
                        if (heldItem.count <= 0) heldItem = null;
                    }
                }
            } 
            else { // ЛКМ
                if (!heldItem && currentItem) {
                    heldItem = { ...currentItem };
                    playerInv[index] = null;
                } 
                else if (heldItem && !currentItem) {
                    playerInv[index] = { ...heldItem };
                    heldItem = null;
                } 
                else if (heldItem && currentItem) {
                    if (heldItem.id === currentItem.id) {
                        // ЛОГІКА СТАКАННЯ:
                        let space = currentItem.maxStack - currentItem.count;
                        let move = Math.min(space, heldItem.count);
                        currentItem.count += move;
                        heldItem.count -= move;
                        if (heldItem.count <= 0) heldItem = null;
                    } else {
                        // Обмін місцями
                        let temp = { ...heldItem };
                        heldItem = { ...currentItem };
                        playerInv[index] = temp;
                    }
                }
            }
            renderInventory();
            updateHeldItemDisplay();
        }

        // --- ВИХІД КРАФТУ ---
        function updateOutput() {
            let woodCount = 0;
            gridSlots.forEach(slot => { if(slot && slot.id === 'log') woodCount++; });

            if(woodCount > 0) {
                currentResult = {
                    id: 'planks', name: 'Дошка', 
                    texture: 'https://grizly.club/uploads/posts/2023-01/1672853506_grizly-club-p-tekstura-dereva-pikselnaya-5.png', 
                    count: woodCount * 4, maxStack: 64
                };
                outputEl.style.backgroundImage = `url(${currentResult.texture})`;
                outputEl.classList.add('active');
                let existingCount = outputEl.querySelector('.item-count');
                if(existingCount) existingCount.remove();
                let count = document.createElement('span');
                count.className = 'item-count';
                count.textContent = '×' + currentResult.count;
                outputEl.appendChild(count);
                collectBtn.disabled = false;
            } else {
                currentResult = null;
                outputEl.style.backgroundImage = '';
                outputEl.classList.remove('active');
                outputEl.innerHTML = '';
                collectBtn.disabled = true;
            }
        }

        function collectResult() {
            if(!currentResult) return;
            let amountToPlace = currentResult.count;
            let placed = false;
            
            for(let i=0; i<playerInv.length; i++) {
                if(playerInv[i] && playerInv[i].id === currentResult.id) {
                    let space = playerInv[i].maxStack - playerInv[i].count;
                    if(space > 0) {
                        let add = Math.min(space, amountToPlace);
                        playerInv[i].count += add;
                        amountToPlace -= add;
                        if(amountToPlace <= 0) { placed = true; break; }
                    }
                }
            }
            if(amountToPlace > 0) {
                for(let i=0; i<playerInv.length; i++) {
                    if(!playerInv[i]) {
                        playerInv[i] = {...currentResult, count: amountToPlace};
                        placed = true; break;
                    }
                }
            }
            
            if(placed || amountToPlace <= 0) {
                for(let i=0; i<gridSlots.length; i++) {
                    if(gridSlots[i] && gridSlots[i].id === 'log') {
                        gridSlots[i].count--;
                        if(gridSlots[i].count <= 0) gridSlots[i] = null;
                    }
                }
                renderInventory();
                currentResult = null;
                collectBtn.disabled = true;
                updateOutput();
            } else {
                alert('Інвентар заповнений!');
            }
        }

        function clearGrid() {
            for(let i=0; i<gridSlots.length; i++) {
                let item = gridSlots[i];
                if(item) {
                    let placed = false;
                    for(let j=0; j<playerInv.length; j++) {
                        if(playerInv[j] && playerInv[j].id === item.id) {
                            let space = playerInv[j].maxStack - playerInv[j].count;
                            if(space > 0) {
                                let amount = Math.min(space, item.count);
                                playerInv[j].count += amount;
                                item.count -= amount;
                                if(item.count <= 0) { placed = true; break; }
                            }
                        }
                    }
                    if(!placed && item.count > 0) {
                        for(let j=0; j<playerInv.length; j++) {
                            if(!playerInv[j]) { playerInv[j] = item; break; }
                        }
                    }
                    gridSlots[i] = null;
                }
            }
            renderInventory();
            updateOutput();
        }

        renderInventory();
        updateHeldItemDisplay();
        updateOutput();
    </script>
</body>
</html>
