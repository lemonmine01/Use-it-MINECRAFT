<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Crafting</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * { box-sizing: border-box; user-select: none; }
        body {
            background: #1a1a1a;
            font-family: 'VT323', monospace;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 { 
            font-size: 40px; 
            margin-bottom: 20px; 
            text-shadow: 3px 3px 0 #000;
        }

        .main-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        /* --- ПАНЕЛЬ ПРЕДМЕТІВ (зліва) --- */
        .items-panel {
            background: #c6c6c6;
            border: 4px solid #000;
            border-top-color: #fff;
            border-left-color: #fff;
            border-bottom-color: #555;
            border-right-color: #555;
            padding: 15px;
            width: 220px;
        }

        .items-panel h2 {
            margin: 0 0 10px 0;
            color: #404040;
            font-size: 24px;
            text-align: center;
            text-shadow: 2px 2px 0 #fff;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(4, 44px);
            gap: 5px;
            justify-content: center;
        }

        .item-button {
            width: 44px;
            height: 44px;
            background: #8b8b8b;
            border: 3px solid #373737;
            border-top-color: #fff;
            border-left-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-size: cover;
            image-rendering: pixelated;
            position: relative;
            transition: transform 0.1s;
        }

        .item-button:hover {
            transform: scale(1.1);
            filter: brightness(1.3);
            z-index: 10;
        }

        .item-button:active {
            transform: scale(0.95);
        }

        /* --- ВЕРСТАК --- */
        .crafting-container {
            background: #c6c6c6;
            border: 4px solid #000;
            border-top-color: #fff;
            border-left-color: #fff;
            border-bottom-color: #555;
            border-right-color: #555;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .workbench-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .grid-3x3 {
            display: grid;
            grid-template-columns: repeat(3, 64px);
            grid-template-rows: repeat(3, 64px);
            gap: 2px;
        }

        .slot {
            width: 64px;
            height: 64px;
            background: #8b8b8b;
            border: 3px solid #373737;
            border-top-color: #fff;
            border-left-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-size: cover;
            image-rendering: pixelated;
            position: relative;
        }

        .slot:hover { 
            filter: brightness(1.2); 
        }

        .slot.filled { 
            border-color: #fff;
        }

        .arrow { 
            font-size: 40px; 
            color: #404040;
        }

        .result-slot {
            width: 70px;
            height: 70px;
            background: #8b8b8b;
            border: 3px solid #373737;
            border-top-color: #fff;
            border-left-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-size: cover;
            image-rendering: pixelated;
            position: relative;
        }

        .result-slot:hover { 
            filter: brightness(1.3);
        }

        .result-slot.active { 
            background-color: #fff;
            box-shadow: 0 0 10px gold;
        }

        .player-inventory {
            margin-top: 20px;
            display: flex;
            gap: 5px;
            background: #c6c6c6;
            padding: 10px;
            border: 4px solid #000;
            border-top-color: #fff;
            border-left-color: #fff;
        }

        .inv-slot {
            width: 54px;
            height: 54px;
            background: #8b8b8b;
            border: 3px solid #373737;
            border-top-color: #fff;
            border-left-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-size: cover;
            image-rendering: pixelated;
            position: relative;
        }

        .inv-slot:hover { 
            filter: brightness(1.2); 
        }

        .inv-slot.selected { 
            border: 3px solid #ff00ff;
            box-shadow: 0 0 5px #ff00ff;
        }

        .item-count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
        }

        .held-item-display {
            position: fixed;
            bottom: 100px;
            right: 100px;
            width: 64px;
            height: 64px;
            background: #8b8b8b;
            border: 3px solid #ff00ff;
            border-top-color: #fff;
            border-left-color: #fff;
            display: none;
            align-items: center;
            justify-content: center;
            background-size: cover;
            image-rendering: pixelated;
            z-index: 1000;
            box-shadow: 0 0 20px #ff00ff;
        }

        .held-item-display.active {
            display: flex;
        }

        .held-item-count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            color: #ff00ff;
            text-shadow: 2px 2px 0 #000;
            font-size: 20px;
            font-weight: bold;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background: #7a7a7a;
            color: white;
            border: 2px solid #000;
            border-top-color: #aaa;
            border-left-color: #aaa;
            padding: 8px 20px;
            font-family: 'VT323', monospace;
            font-size: 20px;
            cursor: pointer;
        }

        .btn:hover {
            background: #8a8a8a;
        }

        .btn:active {
            border-top-color: #000;
            border-left-color: #000;
            border-bottom-color: #aaa;
            border-right-color: #aaa;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info {
            margin-top: 10px;
            color: #404040;
            font-size: 16px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>⛏️ Crafting Table</h1>

    <div class="main-container">
        <!-- ПАНЕЛЬ ПРЕДМЕТІВ -->
        <div class="items-panel">
            <h2>📦 Предмети</h2>
            <div class="items-grid" id="itemsGrid"></div>
        </div>

        <!-- ВЕРСТАК -->
        <div class="crafting-container">
            <div class="workbench-area">
                <div class="grid-3x3" id="grid"></div>
                
                <div class="arrow">➡️</div>
                
                <div class="result-slot" id="output" onclick="collectResult()"></div>
            </div>

            <div class="controls">
                <button class="btn" onclick="clearGrid()">🗑️ Очистити</button>
                <button class="btn" id="collectBtn" onclick="collectResult()" disabled>🎁 Забрати</button>
            </div>
            <div class="info" id="infoText">Клікни на предмет щоб взяти</div>

            <div class="player-inventory" id="inventory"></div>
        </div>
    </div>

    <!-- Відображення предмета в руці -->
    <div class="held-item-display" id="heldItemDisplay">
        <span class="held-item-count" id="heldItemCount"></span>
    </div>

    <script>
        // 📦 ВСІ ДОСТУПНІ ПРЕДМЕТИ
        const allItems = [
            { id: 'log', name: 'Дуб', texture: 'https://abrakadabra.fun/uploads/posts/2021-12/1639881942_8-abrakadabra-fun-p-doski-mainkraft-tekstura-8.png', maxStack: 64 },
            { id: 'planks', name: 'Дошка', texture: 'https://grizly.club/uploads/posts/2023-01/1672853506_grizly-club-p-tekstura-dereva-pikselnaya-5.png', maxStack: 64 },
            { id: 'stick', name: 'Палички', texture: 'https://example.com/stick.png', maxStack: 64 },
            { id: 'cobble', name: 'Камінь', texture: 'https://example.com/cobble.png', maxStack: 64 },
            { id: 'iron', name: 'Залізо', texture: 'https://example.com/iron.png', maxStack: 64 },
            { id: 'diamond', name: 'Діамант', texture: 'https://example.com/diamond.png', maxStack: 64 },
            { id: 'coal', name: 'Вугілля', texture: 'https://example.com/coal.png', maxStack: 64 },
            { id: 'apple', name: 'Яблуко', texture: 'https://example.com/apple.png', maxStack: 64 }
        ];

        // 🎒 ІНВЕНТАР ГРАВЦЯ
        const MAX_STACK = {
            'log': 64, 'planks': 64, 'stick': 64, 'cobble': 64,
            'iron': 64, 'diamond': 64, 'coal': 64, 'apple': 64,
            'sword': 1, 'pickaxe': 1, 'bread': 64
        };

        let heldItem = null;
        let playerInv = [
            null, null, null, null, null, null, null, null, null, null,
            null, null, null, null, null, null, null, null, null, null,
            null, null, null, null, null, null, null, null, null, null
        ];

        // 📜 РЕЦЕПТИ
        const recipes = {
            'log_to_planks': {
                input: 'log',
                output: { id: 'planks', name: 'Дошка', texture: 'https://grizly.club/uploads/posts/2023-01/1672853506_grizly-club-p-tekstura-dereva-pikselnaya-5.png', count: 4, maxStack: 64 },
                shapeless: true
            }
        };

        let currentResult = null;

        // --- ІНІЦІАЛІЗАЦІЯ ---
        const gridEl = document.getElementById('grid');
        const outputEl = document.getElementById('output');
        const inventoryEl = document.getElementById('inventory');
        const itemsGridEl = document.getElementById('itemsGrid');
        const collectBtn = document.getElementById('collectBtn');
        const heldItemDisplay = document.getElementById('heldItemDisplay');
        const heldItemCountEl = document.getElementById('heldItemCount');
        const infoText = document.getElementById('infoText');

        // Створення сітки верстака
        for(let i=0; i<9; i++) {
            let slot = document.createElement('div');
            slot.className = 'slot';
            slot.dataset.index = i;
            slot.onclick = () => handleGridClick(i);
            gridEl.appendChild(slot);
        }

        // Створення панелі предметів
        allItems.forEach(item => {
            let btn = document.createElement('div');
            btn.className = 'item-button';
            btn.style.backgroundImage = `url(${item.texture})`;
            btn.title = item.name;
            btn.onclick = () => takeItemFromPanel(item);
            itemsGridEl.appendChild(btn);
        });

        function getMaxStack(itemId) {
            return MAX_STACK[itemId] || 64;
        }

        // Відображення інвентарю
        function renderInventory() {
            inventoryEl.innerHTML = '';
            playerInv.forEach((item, index) => {
                let slot = document.createElement('div');
                slot.className = 'inv-slot';
                
                if(item) {
                    slot.style.backgroundImage = `url(${item.texture})`;
                    if(item.count > 1) {
                        let count = document.createElement('span');
                        count.className = 'item-count';
                        count.textContent = item.count;
                        slot.appendChild(count);
                    }
                }
                
                if(heldItem && heldItem.id === item?.id) {
                    slot.classList.add('selected');
                }
                
                slot.onclick = () => handleInventoryClick(index);
                inventoryEl.appendChild(slot);
            });
        }

        function updateHeldItemDisplay() {
            if(heldItem) {
                heldItemDisplay.style.backgroundImage = `url(${heldItem.texture})`;
                heldItemCountEl.textContent = heldItem.count;
                heldItemDisplay.classList.add('active');
                infoText.textContent = `В руці: ${heldItem.name} x${heldItem.count}`;
            } else {
                heldItemDisplay.classList.remove('active');
                infoText.textContent = 'Клікни на предмет щоб взяти';
            }
        }

        // Взяти предмет з панелі (креативний режим)
        function takeItemFromPanel(item) {
            if(!heldItem) {
                // Беремо новий предмет з панелі (повний стек)
                heldItem = {
                    ...item,
                    count: item.maxStack
                };
                renderInventory();
                updateHeldItemDisplay();
            } else if(heldItem.id === item.id) {
                // Якщо тримаємо такий самий - додаємо ще (якщо місце є)
                let spaceLeft = heldItem.maxStack - heldItem.count;
                if(spaceLeft > 0) {
                    heldItem.count += spaceLeft;
                    updateHeldItemDisplay();
                }
            } else {
                // Міняємо на інший предмет
                heldItem = {
                    ...item,
                    count: item.maxStack
                };
                renderInventory();
                updateHeldItemDisplay();
            }
        }

        function handleInventoryClick(index) {
            let item = playerInv[index];
            
            if(!heldItem && item) {
                heldItem = {...item};
                playerInv[index] = null;
                renderInventory();
                updateHeldItemDisplay();
            }
            else if(heldItem) {
                if(!item) {
                    playerInv[index] = {...heldItem};
                    heldItem = null;
                }
                else if(item.id === heldItem.id) {
                    let spaceLeft = item.maxStack - item.count;
                    if(spaceLeft > 0) {
                        let amountToPut = Math.min(spaceLeft, heldItem.count);
                        item.count += amountToPut;
                        heldItem.count -= amountToPut;
                        
                        if(heldItem.count <= 0) {
                            heldItem = null;
                        }
                    }
                }
                else {
                    let temp = {...heldItem};
                    heldItem = {...item};
                    playerInv[index] = temp;
                }
                
                renderInventory();
                updateHeldItemDisplay();
            }
        }

        function handleGridClick(index) {
            let gridSlots = document.querySelectorAll('.slot');
            let currentSlot = gridSlots[index];
            
            if(heldItem && !currentSlot.style.backgroundImage) {
                currentSlot.style.backgroundImage = `url(${heldItem.texture})`;
                currentSlot.classList.add('filled');
                currentSlot.dataset.itemId = heldItem.id;
                currentSlot.dataset.maxStack = heldItem.maxStack || 64;
                heldItem = null;
                renderInventory();
                updateHeldItemDisplay();
                updateOutput();
            }
            else if(currentSlot.style.backgroundImage) {
                let itemId = currentSlot.dataset.itemId;
                let maxStack = parseInt(currentSlot.dataset.maxStack) || 64;
                let itemName = itemId === 'log' ? 'Дуб' : itemId;
                let itemTexture = currentSlot.style.backgroundImage.replace(/url\(|\)|"/g, '');
                
                if(!heldItem) {
                    currentSlot.style.backgroundImage = '';
                    currentSlot.classList.remove('filled');
                    delete currentSlot.dataset.itemId;
                    
                    heldItem = { 
                        id: itemId, 
                        name: itemName, 
                        texture: itemTexture, 
                        count: 1,
                        maxStack: maxStack
                    };
                }
                else if(heldItem.id === itemId) {
                    let spaceLeft = heldItem.maxStack - heldItem.count;
                    if(spaceLeft > 0) {
                        currentSlot.style.backgroundImage = '';
                        currentSlot.classList.remove('filled');
                        delete currentSlot.dataset.itemId;
                        
                        heldItem.count += 1;
                    }
                }
                else {
                    currentSlot.style.backgroundImage = `url(${heldItem.texture})`;
                    currentSlot.dataset.itemId = heldItem.id;
                    
                    heldItem = { 
                        id: itemId, 
                        name: itemName, 
                        texture: itemTexture, 
                        count: 1,
                        maxStack: maxStack
                    };
                }
                
                renderInventory();
                updateHeldItemDisplay();
                updateOutput();
            }
        }

        function updateOutput() {
            let gridSlots = document.querySelectorAll('.slot');
            let woodCount = 0;

            gridSlots.forEach(slot => {
                if(slot.dataset.itemId === 'log') {
                    woodCount++;
                }
            });

            if(woodCount > 0) {
                currentResult = {
                    id: 'planks',
                    name: 'Дошка',
                    texture: 'https://grizly.club/uploads/posts/2023-01/1672853506_grizly-club-p-tekstura-dereva-pikselnaya-5.png',
                    count: woodCount * 4,
                    maxStack: 64
                };
                
                outputEl.style.backgroundImage = `url(${currentResult.texture})`;
                outputEl.classList.add('active');
                
                let existingCount = outputEl.querySelector('.item-count');
                if(existingCount) existingCount.remove();
                
                let count = document.createElement('span');
                count.className = 'item-count';
                count.textContent = '×' + currentResult.count;
                outputEl.appendChild(count);
                
                collectBtn.disabled = false;
            } else {
                currentResult = null;
                outputEl.style.backgroundImage = '';
                outputEl.classList.remove('active');
                outputEl.innerHTML = '';
                collectBtn.disabled = true;
            }
        }

        function collectResult() {
            if(!currentResult) return;
            
            let placed = false;
            
            for(let i=0; i<playerInv.length; i++) {
                if(playerInv[i] && playerInv[i].id === currentResult.id) {
                    let spaceLeft = playerInv[i].maxStack - playerInv[i].count;
                    if(spaceLeft > 0) {
                        let amountToAdd = Math.min(spaceLeft, currentResult.count);
                        playerInv[i].count += amountToAdd;
                        currentResult.count -= amountToAdd;
                        
                        if(currentResult.count <= 0) {
                            placed = true;
                            break;
                        }
                    }
                }
            }
            
            if(!placed && currentResult.count > 0) {
                for(let i=0; i<playerInv.length; i++) {
                    if(!playerInv[i]) {
                        playerInv[i] = {...currentResult};
                        placed = true;
                        break;
                    }
                }
            }
            
            if(placed || currentResult.count <= 0) {
                clearGrid(false);
                renderInventory();
                currentResult = null;
                collectBtn.disabled = true;
            } else {
                alert('Інвентар заповнений!');
            }
        }

        function clearGrid(saveToInventory = true) {
            let gridSlots = document.querySelectorAll('.slot');
            gridSlots.forEach(slot => {
                if(slot.style.backgroundImage && saveToInventory) {
                    let itemId = slot.dataset.itemId || 'unknown';
                    let maxStack = parseInt(slot.dataset.maxStack) || 64;
                    let itemTexture = slot.style.backgroundImage.replace(/url\(|\)|"/g, '');
                    
                    let placed = false;
                    
                    for(let i=0; i<playerInv.length; i++) {
                        if(playerInv[i] && playerInv[i].id === itemId) {
                            let spaceLeft = playerInv[i].maxStack - playerInv[i].count;
                            if(spaceLeft > 0) {
                                playerInv[i].count += 1;
                                placed = true;
                                break;
                            }
                        }
                    }
                    
                    if(!placed) {
                        for(let i=0; i<playerInv.length; i++) {
                            if(!playerInv[i]) {
                                playerInv[i] = {
                                    id: itemId,
                                    name: itemId === 'log' ? 'Дуб' : itemId,
                                    texture: itemTexture,
                                    count: 1,
                                    maxStack: maxStack
                                };
                                break;
                            }
                        }
                    }
                }
                
                slot.style.backgroundImage = '';
                slot.classList.remove('filled');
                delete slot.dataset.itemId;
            });
            
            if(saveToInventory) {
                renderInventory();
            }
            updateOutput();
        }

        // Початкове відображення
        renderInventory();
        updateHeldItemDisplay();
        updateOutput();
    </script>
</body>
</html>
